<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="menu-lateral.css">
    <link rel="stylesheet" href="formulario.css">
    <title>Registro - Mi Pag Web</title>
</head>
<body>
    <input type="checkbox" id="btn-menu" class="checkbox-control">
    <label for="btn-menu" class="toggle-btn">☰</label>

    <div class="layout-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3>mi pag web</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><span class="menu-icon">📊</span><span class="menu-text">Dashboard</span></a></li>
                <li><a href="registro.html"><span class="menu-icon">🗒️</span><span class="menu-text">Registro</span></a></li>
                <li><a href="historial.html"><span class="menu-icon">📋</span><span class="menu-text">Historial</span></a></li>
            </ul>
        </nav>
    </div>

    <main>
        <section class="container-form">
            <h2>añadir nueva entrada</h2>
            <form action="#" method="post" class="main-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="titulo">Título</label>
                        <input type="text" id="titulo" name="titulo" placeholder="Resumen bitácora">
                    </div>
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select name="categoria" id="categoria" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="trabajo">Trabajo</option>
                            <option value="personal">Personal</option>
                            <option value="ideas">Ideas</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="valoracion">Valoración</label>
                        <select id="valoracion" name="valoracion" required>
                            <option value="5">⭐⭐⭐⭐⭐ (Excelente)</option>
                            <option value="4">⭐⭐⭐⭐ (Bueno)</option>
                            <option value="3">⭐⭐⭐ (Regular)</option>
                            <option value="2">⭐⭐ (Malo)</option>
                            <option value="1">⭐ (Pésimo)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group-full-width">
                    <label for="descripcion">Descripción</label>
                    <textarea name="descripcion" id="descripcion" rows="6" placeholder="Escribe los detalles aquí..." required></textarea>
                </div>
                <div class="form-actions-full-width">
                    <button type="submit" class="btn-submit">Guardar Entrada</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
