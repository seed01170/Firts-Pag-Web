<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="menu-lateral.css">
    <link rel="stylesheet" href="dashboard.css">
    <title>Mi Pag Web Inicial</title>
</head>
<body>
        <input type="checkbox" id="btn-menu" class="checkbox-control">
        <label for="btn-menu" class="toggle-btn">☰</label>

        <div class="layout-container">
            <nav class="sidebar">
                <div class="sidebar-header">
                    <h3>mi pag web</h3>
                </div>
                <ul class="sidebar-menu">
                    <li>
                        <a href="index.html">
                            <span class="menu-icon">📊</span>
                            <span class="menu-text">Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="registro.html">
                            <span class="menu-icon">🗒️</span>
                            <span class="menu-text">Registro</span>
                        </a>
                    </li>
                    <li>
                        <a href="historial.html">
                            <span class="menu-icon">📋</span>
                            <span class="menu-text">Historial</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

    <main>
        <section class="dashboard-grid">
            <article class="card">
                <div class="card-header">
                    <h3>total de entardas</h3>
                    <span class="icon">👥</span>
                </div>
                <p class="card-value">124</p>
            </article>
            <article class="card">
                <div class="card-header">
                    <h3>ultima entrada</h3>
                    <span class="icon">📅</span>
                </div>
                <p class="card-value">18 May 2026</p>
            </article>
            <article class="card">
                <div class="card-header">
                    <h3>categoria popular</h3>
                    <span class="icon">📊</span>
                </div>
                <p class="card-value">trabajo</p>
            </article>
        </section>

        <section class="dashboard-chart-section">
            <h2>entradas diarias</h2>
            <div class="container-dashboard">
                <svg viewBox="0 0 500 200" preserveAspectRadio="none" class="chart-svg">
                    <defs>
                        <linearGradient id="chart-gradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
                            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.0"/>
                        </linearGradient>
                    </defs>

                    <path d="M 0 200 Q 100 150 200 120 T 400 60 T 500 40 L 500 200 Z" fill="url(#chart-gradient)"></path>
                    <path d="M 0 200 Q 100 150 200 120 T 400 60 T 500 40" fill="none" stroke="#3b82f6" stroke-width="3"></path>
                </svg>
            </div>
        </section>
    </main>
</body>
</html>
